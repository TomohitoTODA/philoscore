<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ページが見つかりません — 楽譜ライブラリ</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <style>
      body {
        margin: 0;
        font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
        background: #f3f3f5;
        color: #1a1a1a;
        display: grid;
        place-items: center;
        min-height: 100dvh;
      }
      .box {
        text-align: center;
        padding: 40px 24px;
      }
      h1 {
        font-size: 64px;
        font-weight: 800;
        margin: 0 0 8px;
        color: #d0d0d4;
      }
      p {
        margin: 0 0 24px;
        color: #8a8a92;
        font-size: 16px;
      }
      a {
        display: inline-block;
        background: #111111;
        color: #fff;
        border-radius: 999px;
        padding: 12px 24px;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>404</h1>
      <p>お探しのページは見つかりませんでした。</p>
      <a href="/">ライブラリへ戻る</a>
    </div>
  </body>
</html>
